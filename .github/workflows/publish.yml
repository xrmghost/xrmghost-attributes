name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from changelog
        id: version
        shell: bash
        run: |
          version=$(python3 -c "import pathlib, re; content = pathlib.Path('CHANGELOG.md').read_text(encoding='utf-8'); match = re.search(r'\\[(\\d+\\.\\d+\\.\\d+)\\]', content); print(match.group(1) if match else '')")

          if [[ -z "$version" ]]; then
            echo "No version found in CHANGELOG.md matching [x.y.z]" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches changelog version
        shell: bash
        run: |
          expected_tag="v${{ steps.version.outputs.version }}"

          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not match changelog version '$expected_tag'" >&2
            exit 1
          fi

      - name: Find solution file
        id: solution
        shell: bash
        run: |
          shopt -s nullglob
          solutions=(*.sln)

          if (( ${#solutions[@]} != 1 )); then
            echo "Expected exactly one solution file, found ${#solutions[@]}" >&2
            exit 1
          fi

          echo "path=${solutions[0]}" >> "$GITHUB_OUTPUT"

      - name: Setup strong name key
        shell: bash
        env:
          STRONG_NAME_KEY_FULL: ${{ secrets.STRONG_NAME_KEY_FULL }}
        run: |
          if [[ -z "$STRONG_NAME_KEY_FULL" ]]; then
            echo "STRONG_NAME_KEY_FULL secret is required for signed release builds" >&2
            exit 1
          fi

          printf '%s' "$STRONG_NAME_KEY_FULL" | base64 --decode > XrmGhost.Attributes.snk

      - name: Validate Trusted Publishing settings
        shell: bash
        env:
          NUGET_PUBLISH_USER: ${{ secrets.NUGET_PUBLISH_USER }}
        run: |
          if [[ -z "$NUGET_PUBLISH_USER" ]]; then
            echo "NUGET_PUBLISH_USER must be configured with the nuget.org profile name used for Trusted Publishing" >&2
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore "${{ steps.solution.outputs.path }}"

      - name: Build solution
        run: >-
          dotnet build "${{ steps.solution.outputs.path }}" -c Release --no-restore
          /p:Version="${{ steps.version.outputs.version }}"
          /p:VersionPrefix="${{ steps.version.outputs.version }}"
          /p:AssemblyVersion="${{ steps.version.outputs.version }}"
          /p:FileVersion="${{ steps.version.outputs.version }}"

      - name: Pack solution
        run: >-
          dotnet pack "${{ steps.solution.outputs.path }}" -c Release --no-build --output ./nupkg
          /p:PackageVersion="${{ steps.version.outputs.version }}"

      - name: Verify signed assembly metadata
        shell: pwsh
        run: |
          $assembly = Get-ChildItem -Path ./bin/Release -Recurse -Filter XrmGhost.Attributes.dll | Select-Object -First 1

          if (-not $assembly) {
            throw 'Could not find XrmGhost.Attributes.dll under ./bin/Release'
          }

          $assemblyName = [System.Reflection.AssemblyName]::GetAssemblyName($assembly.FullName)
          $publicKey = $assemblyName.GetPublicKey()
          $publicKeyToken = $assemblyName.GetPublicKeyToken()

          if (-not $publicKey -or $publicKey.Length -eq 0) {
            throw "Assembly '$($assembly.FullName)' does not contain a public key"
          }

          if (-not $publicKeyToken -or $publicKeyToken.Length -eq 0) {
            throw "Assembly '$($assembly.FullName)' does not contain a public key token"
          }

          $tokenHex = -join ($publicKeyToken | ForEach-Object { $_.ToString('x2') })
          Write-Host "Signed assembly verified: $($assembly.FullName)"
          Write-Host "Assembly version: $($assemblyName.Version)"
          Write-Host "Public key token: $tokenHex"

      - name: Locate package
        id: package
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./nupkg/*.nupkg)

          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one package in ./nupkg, found ${#packages[@]}" >&2
            exit 1
          fi

          echo "package_path=${packages[0]}" >> "$GITHUB_OUTPUT"

      - name: Verify package contains library assembly
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $packagePath = '${{ steps.package.outputs.package_path }}'
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $packagePath))

          try {
            $libraryEntry = $zip.Entries | Where-Object { $_.FullName -like 'lib/*/XrmGhost.Attributes.dll' } | Select-Object -First 1

            if (-not $libraryEntry) {
              throw "Package '$packagePath' does not contain XrmGhost.Attributes.dll under lib/"
            }

            Write-Host "Package verified: $($libraryEntry.FullName)"
          }
          finally {
            $zip.Dispose()
          }

      - name: NuGet login with Trusted Publishing
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_PUBLISH_USER }}

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "${{ steps.package.outputs.package_path }}"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Cleanup strong name key
        if: always()
        shell: bash
        run: rm -f XrmGhost.Attributes.snk
